model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    lm_checkpoint_variant: "it"
    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"
    projector_type: "mlp2x_gelu"
    projector_use_ln: False
    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    image_post_connector_scale: 1.0
    image_post_connector_transform: "fixed_scale"
    image_text_stat_source: "prompt"
    image_text_stat_axes: "scalar"
    prompt_causal: True
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    # Stage-2 trained/evaluated with 512 text tokens; eval-only must not inherit
    # the top-level curriculum pretrain length.
    max_txt_len: 512
    resize_mode: stretch
    num_workers: 16
    prefetch_factor: 4
    dataloader_timeout: 900
    stateful_dataloader: False
    stateful_dataloader_strict: False

training:
    seed: 42
    batch_size: 128
    optimizer: adam
    freeze_lm: False
    freeze_lm_embed: False
    freeze_lm_late: False
    freeze_image_encoder: True
    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface
    online_eval_tasks: []
    final_eval_tasks: [vqav2, mme, textvqa, pope, refcocog, pixelbench, mmbench, gqa, vizwiz, scienceqa_img, seed_bench]

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    device_batch_size: 32
    # PixelBench runs VStar with beam_size=5; keep its per-device batch small
    # enough to avoid beam-expanded generation OOM on v6e/v5p eval jobs.
    pixelbench_device_batch_size: 4
    eval_tokens_default: 64
    eval_tokens_shortqa: 8
    eval_tokens_mid: 16
    eval_tokens_ocr: 32
    eval_tokens_refcoco: 16
    eval_tokens_pixelbench: 32
    eval_tokens_mmbench: 8
    online_vqav2_sample_fraction: 0.1

load_from: /kmh-nfs-ssd-us-mount/logs/sqa/paligemma-baseline/20260614_023229_ahm6gg_kmh-tpuvm-v5p-64-spot-keya-7bhzyk_us-central1-a__b_lr_ep_eval
load_from_pretrained: ""
eval_only: True
finetune: False
sharding: hsdp_legacy_data

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_entity: "sqa24-massachusetts-institute-of-technology"
    wandb_tags: ["eval-only", "llava1.5", "stage2-final", "window-7640-fix"]
    wandb_notes: "[eval only] 7640 fix: final stage2 eval for [shuffle more] [ablation: stage 2 train 3x longer] [rerun baseline with cc12m, 160 length]. Loads checkpoint_17180 from window 7622 and uses the code path that does not restore train dataloader state."
