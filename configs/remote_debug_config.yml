# One-card remote smoke test for the same pretrain dataset path as stage-1.
# Keep this intentionally small so path/auth/GCS issues fail fast without
# warming a large WebDataset shuffle buffer.
model:
    arch: llava
    lm_backbone_str: "gemma3_270M"
    lm_checkpoint_variant: "it"

    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"

    projector_type: "mlp2x_gelu"
    projector_use_ln: False

    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    max_txt_len: 64
    resize_mode: stretch
    num_workers: 1
    prefetch_factor: 1
    dataloader_timeout: 120
    pin_memory: False
    webdataset_shuffle_size: 16
    items:
        - blip3o-short
    mix_weights: [1]

training:
    curriculum: ""
    num_steps: 1
    batch_size: 16

    vision_tower_from_scratch: True
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    freeze_lm: True
    freeze_image_encoder: True
    optimizer: adam
    adam:
        learning_rate: 0.001
        adam_b2: 0.999
        weight_decay: 0.0
    grad_clip_norm: 1.0
    warmup_steps: 1
    lr_schedule: cos

    log_per_step: 1
    checkpoint_per_step: -1
    log_vis_per_step: -1
    sample_per_step: -1
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: []
    seed: 42

sampling:
    max_new_tokens: 4
    beam_size: 1

eval:
    device_batch_size: 1
    eval_recon_tokens: []

finetune: False
sharding: hsdp
load_from: ''
load_from_pretrained: ''
eval_only: False
local_debug: False

logging:
    use_wandb: False
    use_tensorboard: False
    wandb_project: "jax-llava"
    wandb_entity: "sqa24-massachusetts-institute-of-technology"
    wandb_tags: ["remote-debug", "llava", "blip3o-short"]
    wandb_notes: "remote_debug: one-step small-model BLIP3o-short dataloader smoke test."
