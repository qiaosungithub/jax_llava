model:
    image_encoder_str: "b16"
    lm_backbone_str: "gemma3_270M"
    projector_use_ln: True

dataset:
    image_size: 224
    root:
        - "gs://kmh-gcp-💣/data/laion-aesthetic/part-{00000..00127}-cad4a140-cebd-46fa-b874-e8968f93e32e-c000.snappy/{00000..00040}.tar" # data scale: 50M
        - "gs://kmh-gcp-💣/data/cc12m/{00000..01096}.tar" # data scale: 12M
        - "gs://kmh-gcp-💣/data/vqav2/vqav2_image_records_wds/train2014/shard-{000000..000008}.tar" # data scale: 400K=0.4M
        # - "gs://kmh-gcp-💣/data/llava150k/shard_{000000..000015}/data.tar"
    mix_weights: [50, 12, 0.4]

training:
    optimizer: 'adam'
    adam:
        learning_rate: 0.0002
        adam_b2: 0.95
    muon:
        learning_rate: 0.001
    lr_schedule: cos

    log_per_step: 1
    checkpoint_per_step: 10
    log_vis_per_step: 1

    num_steps: 50000
    batch_size: 1024
    warmup_steps: 10000 # enabled in the original paper
    siglip_warmup_steps: 100000

    sample_on_training: True
    sample_per_step: 1
    cider_per_step: -1
    vqav2_per_step: 50000
    mme_per_step: 50000

    seed: 42

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_vqav2: True
    eval_mme: True

load_from: ''

# sharding: hsdp # ddp, hsdp, fsdp

logging:
    use_wandb: False
    use_tensorboard: False
    wandb_project: 'paligemma-baseline' # change to your wandb project
    wandb_entity: 'sqa24-massachusetts-institute-of-technology' # paste your wandb entity here
    wandb_tags: # use your own tags
        - hsdp
    wandb_notes:

load_from: /kmh-nfs-ssd-us-mount/logs/sqa/paligemma-baseline/20260214_001430_mzfo7i_VMNAME_kmh-tpuvm-v6e-64-spot-sqa7luldt_ZONE_us-central1-b # correct sampling. 300k steps, lr2e-5, LAION-aes, beam size 3
