# Eval-only-through-curriculum config for W&B run sahzaodl / earthy-field-61.
# Purpose: rerun only VQA-normalization-affected final metrics with latest code:
# VQAv2, TextVQA, and VizWiz (including the existing VizWiz beam5 side eval).
# Keep queue zone us-central1 so checkpoint and eval data resolve to the same region.
model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    lm_checkpoint_variant: "it"
    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"
    projector_type: "mlp2x_gelu"
    projector_use_ln: False
    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    image_post_connector_scale: 1.0
    image_post_connector_transform: "fixed_scale"
    image_text_stat_source: "prompt"
    image_text_stat_axes: "scalar"
    prompt_causal: True
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    max_txt_len: 2048
    resize_mode: stretch
    num_workers: 16
    prefetch_factor: 4
    dataloader_timeout: 900
    # This run enters the completed-curriculum final-eval path and never builds
    # the train loader. Keep stateful disabled as an extra guard.
    stateful_dataloader: False
    stateful_dataloader_strict: False
    item_shuffle_size:
        default: 2048
        llava_ov15: 200000
        vqav2: 2048
        okvqa: 2048
        aokvqa: 2048
        ocrvqa: 2048
        gqa: 2048
        textvqa: 2048
        genome: 2048
        genome_det: 2048
        refcoco: 2048
    genome_det_regions_per_image: 10

training:
    curriculum: llava15_two_stage
    stage1_steps: 2180
    stage2_steps: 5195
    num_steps: 7375

    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    optimizer: adam
    grad_clip_norm: 1.0
    log_per_step: 100
    checkpoint_per_step: 800
    log_vis_per_step: -1
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: []
    lr_schedule: cos
    seed: 42

    stage1:
        name: "stage1_projector_pretrain"
        dataset:
            max_txt_len: 160
        dataset_items:
            - cc12m
        mix_weights: [1]
        batch_size: 256
        freeze_lm: True
        freeze_image_encoder: True
        optimizer: adam
        adam:
            learning_rate: 0.001
            adam_b2: 0.95
            weight_decay: 0.0
        vision_encoder_learning_rate: 0.00002
        connector_learning_rate: 0.001
        warmup_steps: 65
        lr_schedule: cos
        sample_per_step: -1
        online_eval_per_step: -1
        online_eval_tasks: []
        final_eval_tasks: []

    stage2:
        name: "stage2_visual_instruction_sft"
        dataset:
            max_txt_len: 512
        dataset_items:
            - llava-ov-1.5-instruct-image-shuffled-v1
            - vqav2
            - okvqa-train
            - aokvqa-train
            - ocrvqa-train
            - gqa-train
            - textcaps-train
            - visual-genome
            - visual-genome-det
            - refcoco-train
        mix_weights: [22, 0.4, 0.009, 0.068, 0.08, 0.94, 0.022, 1.7, 0.86, 0.048]
        batch_size: 512
        freeze_lm: False
        freeze_lm_embed: False
        freeze_lm_late: False
        freeze_image_encoder: True
        optimizer: adam
        adam:
            learning_rate: 0.00004
            adam_b2: 0.95
            weight_decay: 0.0
        vision_encoder_learning_rate: 0.00004
        connector_learning_rate: 0.001
        warmup_steps: 156
        lr_schedule: cos
        sample_per_step: 200
        online_eval_per_step: -1
        online_eval_tasks: []
        # Only these scorer paths changed in the VQA normalization fix.
        final_eval_tasks: [vqav2, textvqa, vizwiz]

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_recon_tokens: []
    device_batch_size: 32
    eval_tokens_default: 64
    eval_tokens_shortqa: 8
    eval_tokens_mid: 16
    eval_tokens_ocr: 32
    eval_tokens_refcoco: 16
    eval_tokens_pixelbench: 32
    eval_tokens_mmbench: 8
    online_vqav2_sample_fraction: 0.1

finetune: False
# Must stay False: curriculum completed-checkpoint path logs *_stage2_final.
eval_only: False
sharding: hsdp_legacy_data

load_from: /kmh-nfs-ssd-us-mount/logs/sqa/paligemma-baseline/20260614_055101_lxas6k_kmh-tpuvm-v5p-64-spot-llqylsn66_us-central1-a__b_lr_ep_eval
load_from_pretrained: ""
wandb_resume_id: "sahzaodl"

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_entity: "sqa24-massachusetts-institute-of-technology"
    wandb_tags: ["llava1.5", "curriculum", "hsdp", "eval-rerun", "vqa-normalization-fix"]
    wandb_notes: "[eval rerun] [vqa normalization fix] [llava-1.5 reproduction] Resume W&B run sahzaodl and rerun only VQAv2, TextVQA, and VizWiz stage2_final metrics from checkpoint_7375. Unchanged benchmarks are intentionally not rerun. Source run notes: [shuffle more] [ablation: stage 2 4x batch size] [rerun baseline with cc12m, 160 length]."
