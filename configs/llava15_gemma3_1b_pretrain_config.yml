model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    # TODO(ablation): compare IT vs PT under the same LLaVA two-stage recipe.
    # Vicuna-v1.5 is instruction-tuned, so IT is the closer Gemma substitute.
    lm_checkpoint_variant: "it"

    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"

    projector_type: "mlp2x_gelu"
    projector_use_ln: False

    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    max_txt_length: 2048
    resize_mode: stretch

    # Stage-1 target is LLaVA-Pretrain 558K (LAION/CC/SBU + BLIP captions).
    # TODO(data): replace this fallback with exact LLaVA-Pretrain-558K after it
    # is mirrored into the regional buckets. The step count below keeps the
    # sample count aligned: 2180 * 256 = 558080 examples.
    items:
        - blip3o-short
    mix_weights: [1]

    num_workers: 16
    prefetch_factor: 4

training:
    # LLaVA stage-1: frozen CLIP + frozen LM, train only the projector.
    freeze_lm: True
    freeze_image_encoder: True
    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    optimizer: adam
    adam:
        learning_rate: 0.001
        adam_b2: 0.95
        weight_decay: 0.0

    grad_clip_norm: 1.0
    log_per_step: 20
    checkpoint_per_step: 1000
    log_vis_per_step: -1
    sample_per_step: -1
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: []

    num_steps: 2180
    warmup_steps: 65
    siglip_warmup_steps: 65
    lr_schedule: cos
    batch_size: 256
    seed: 42

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_recon_tokens: []

finetune: False

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_tags: ["llava15", "gemma3-1b", "stage1", "clip-l14-336"]
    wandb_notes: "LLaVA-style stage-1. Uses blip3o-short as 558K-count fallback until exact LLaVA-Pretrain-558K is mirrored."
