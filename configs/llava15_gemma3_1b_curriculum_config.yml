model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    # TODO(ablation): compare IT vs PT under the same LLaVA two-stage recipe.
    # Vicuna-v1.5 is instruction-tuned, so IT is the closer Gemma substitute.
    lm_checkpoint_variant: "it"

    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"

    projector_type: "mlp2x_gelu"
    projector_use_ln: False

    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    max_txt_length: 2048
    resize_mode: stretch
    num_workers: 16
    prefetch_factor: 4

training:
    curriculum: llava15_two_stage

    # Global checkpoint steps stay monotonic in one workdir:
    # stage-1: [0, 2180), stage-2: [2180, 7375).
    stage1_steps: 2180      # 2180 * 256 = 558080 samples
    stage2_steps: 5195      # 5195 * 128 = 664960 samples
    num_steps: 7375

    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    optimizer: adam
    grad_clip_norm: 1.0
    log_per_step: 20
    checkpoint_per_step: 1000
    log_vis_per_step: -1
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: []
    lr_schedule: cos
    seed: 42

    stage1:
        name: "stage1_projector_pretrain"
        # LLaVA-Pretrain 558K target: short image-caption alignment.
        # Current fallback is blip3o-short to match short-caption length/scale.
        dataset_items:
            - blip3o-short
        mix_weights: [1]
        batch_size: 256
        freeze_lm: True
        freeze_image_encoder: True
        optimizer: adam
        adam:
            learning_rate: 0.001
            adam_b2: 0.95
            weight_decay: 0.0
        warmup_steps: 65
        siglip_warmup_steps: 65
        lr_schedule: cos
        sample_per_step: -1
        online_eval_per_step: -1
        online_eval_tasks: []
        final_eval_tasks: []

    stage2:
        name: "stage2_visual_instruction_sft"
        dataset_items:
            - llava-ov-1.5-instruct
            - vqav2
            - gqa-train
            - textcaps-train
            - visual-genome
        # Approximate current loader sample units in millions. This is not the
        # exact LLaVA-1.5 665K recipe because our VQA/GQA loader expands QA pairs
        # instead of merging each image's QA pairs into one conversation.
        # Visual Genome is loaded as image QA pairs here, not VG grounding.
        mix_weights: [22, 0.4, 0.94, 0.022, 1.7]
        batch_size: 128
        freeze_lm: False
        freeze_image_encoder: True
        optimizer: adam
        adam:
            learning_rate: 0.00002
            adam_b2: 0.95
            weight_decay: 0.0
        warmup_steps: 156
        siglip_warmup_steps: 156
        lr_schedule: cos
        sample_per_step: 200
        online_eval_per_step: -1
        online_eval_tasks: []
        final_eval_tasks: [gqa, vizwiz, scienceqa_img, seed_bench]

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_recon_tokens: []

finetune: False
sharding: hsdp

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_tags: ["llava15", "gemma3-1b", "curriculum", "clip-l14-336"]
    wandb_notes: "Single-workdir LLaVA-style curriculum: blip3o-short projector pretrain then LLaVA-OV1.5 plus VQAv2/GQA/TextCaps/Visual Genome QA SFT."
