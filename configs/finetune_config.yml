model:
    patch_size: 16
    num_learnable_tokens: 256 # K
    feature_dim: 768
    # und_use_tokens: 128

    # masking config
    mask_strategy: "exp" # square, uniform, exp
    und_use_mask: False
    recon_use_mask: False

    # # encoder (MAE-L)
    # enc_hidden_dim: 1024
    # enc_num_patch_sa_layers: 6
    # enc_num_cross_attn_layers: 12
    # enc_num_token_sa_layers: 6
    # encoder (MAE-B)
    enc_hidden_dim: 768
    enc_num_patch_sa_layers: 3
    enc_num_cross_attn_layers: 6
    enc_num_token_sa_layers: 3
    # decoder
    dec_hidden_dim: 512 # MAE default setting
    dec_num_layers: 6

    lm_backbone_str: "gemma3_270M"
    projector_use_ln: True
    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    use_2l_mlp: True

    txt_feature_layer: 15 # gemma3-270M has 18 layers

    # Loss weights (only normal loss for SFT)
    vlm_loss_weight: 1.0 # the normal image-conditioned NTP
    text_only_loss_weight: 0.0  # text-only NTP (unconditional branch; ignored when alpha=0)
    cfg_loss_weight: 0.0        # CFG-style contrastive loss  (ignored when alpha=0)
    recon_loss_weight: 0.0      # image reconstruction MSE
    alpha: 0.0                  # CFG contrastive α; set >0 to enable text-only forward pass

dataset:
    image_size: 256
    max_txt_length: 256
    # LLaVA-1.5 samples 10 Visual Genome region annotations per image.
    genome_det_regions_per_image: 10
    root:
        - llava-ov-1.5-instruct-image-shuffled-v1 # data scale: 22M
        - vqav2                 # data scale: 400K=0.4M
        - okvqa-train           # data scale: 9K=0.009M
        - aokvqa-train          # data scale: ~68K=0.068M after MC augmentation
        - ocrvqa-train          # full upload is 802K QA; weight samples at LLaVA ~80K scale
        - gqa-train             # data scale: 943K QA over 72K train images
        - textcaps-train        # data scale: 22K captions
        - visual-genome         # data scale: ~1.7M QA
        - visual-genome-det     # data scale: ~0.86M region phrase-to-box samples after 10 regions/image
        - refcoco-train         # data scale: ~48K phrase-to-box samples
    mix_weights: [22, 0.4, 0.009, 0.068, 0.08, 0.94, 0.022, 1.7, 0.86, 0.048]

    num_workers: 32
    prefetch_factor: 4
    item_shuffle_size:
        default: 512
        llava_ov15: 50000
        ocrvqa: 512
        genome_det: 512
        refcoco: 512

    resize_mode: letterbox # letterbox (padding to square), stretch (resize to square)

training:
    freeze_lm: False
    lm_init_pretrained_text_layers_only: False # If on, only load text embedding layers
    vision_encoder_lr_scale: 1.0
    optimizer: muon
    adam:
        learning_rate: 0.000002
        adam_b2: 0.95
        weight_decay: 0.02
    muon:
        learning_rate: 0.0001
        weight_decay: 0.02
        consistent_rms: true
        # learning_rate: 0.00005 # textvqa
        # weight_decay: 0.2

    grad_clip_norm: 0.0

    log_per_step: 100
    checkpoint_per_step: 3000
    log_vis_per_step: 3000

    num_steps: 90000 # vqav2
    warmup_steps: 9000

    lr_schedule: cos
    batch_size: 256

    online_eval_per_step: 9000
    online_eval_tasks: [vqav2, mme, textvqa, pope, refcocog, pixelbench]
    final_eval_tasks: [vqav2, mme, textvqa, pope, mmbench, knn_full, refcocog, pixelbench]

    seed: 30

sampling:
    max_new_tokens: 64
    beam_size: 1

eval: {}

finetune: True  # always True in this file

