model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    # TODO(ablation): compare Gemma3-1B-IT vs Gemma3-1B-PT for the same
    # two-stage data recipe. IT is closer to Vicuna-v1.5.
    lm_checkpoint_variant: "it"

    # LLaVA-1.5 vision tower settings.
    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"

    # LLaVA-1.5 projector.
    projector_type: "mlp2x_gelu"
    projector_use_ln: False

    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    max_txt_length: 2048
    resize_mode: stretch
    items:
        - llava-1.5
    mix_weights: [1]
    num_workers: 16
    prefetch_factor: 4

training:
    # LLaVA-1.5 SFT convention: freeze CLIP, tune projector + LM.
    freeze_lm: False
    freeze_image_encoder: True
    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    optimizer: adam
    adam:
        learning_rate: 0.00002
        adam_b2: 0.95
        weight_decay: 0.0

    grad_clip_norm: 1.0
    log_per_step: 20
    checkpoint_per_step: 1000
    log_vis_per_step: -1
    sample_per_step: 200
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: []

    num_steps: 1000
    warmup_steps: 30
    lr_schedule: cos
    batch_size: 128
    seed: 42

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_recon_tokens: []

finetune: False

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_tags: ["llava15", "gemma3-1b", "clip-l14-336", "sanity"]
