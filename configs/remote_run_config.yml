model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    lm_checkpoint_variant: "it"

    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"

    projector_type: "mlp2x_gelu"
    projector_use_ln: False

    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    max_txt_len: 2048
    resize_mode: stretch
    num_workers: 16
    prefetch_factor: 4
    dataloader_timeout: 900
    item_shuffle_size:
        default: 512
        llava_ov15: 512
        vqav2: 512
        gqa: 512
        textvqa: 512
        genome: 512

training:
    curriculum: llava15_two_stage # train 2 stages together.

    # Global checkpoint stream in one workdir:
    # stage-1 [0, 2180), stage-2 [2180, 7375).
    stage1_steps: 2180
    stage2_steps: 5195
    num_steps: 7375

    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    optimizer: adam
    grad_clip_norm: 1.0
    log_per_step: 100
    checkpoint_per_step: 800
    log_vis_per_step: -1
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: []
    lr_schedule: cos
    seed: 42

    stage1:
        name: "stage1_projector_pretrain"
        dataset:
            max_txt_len: 64
        dataset_items:
            - blip3o-short
        mix_weights: [1]
        batch_size: 256
        freeze_lm: True
        freeze_image_encoder: True
        optimizer: adam # TODO: ablate muon
        adam:
            learning_rate: 0.001
            adam_b2: 0.95
            weight_decay: 0.0
        warmup_steps: 65
        lr_schedule: cos
        sample_per_step: -1
        online_eval_per_step: 500
        online_eval_tasks: [knn_partial]
        final_eval_tasks: [knn_full, vqav2]

    stage2:
        name: "stage2_visual_instruction_sft"
        dataset:
            max_txt_len: 512
        dataset_items:
            - llava-ov-1.5-instruct
            - vqav2
            - gqa-train
            - textcaps-train
            - visual-genome
        # Approximate current loader sample units in millions:
        # LLaVA-OV1.5 22M, VQAv2 ~0.4M QA, GQA train ~0.94M QA,
        # TextCaps ~0.022M captions, Visual Genome ~1.7M QA.
        # TODO: implement LLaVA-1.5-style per-image QA conversation merging for exact 665K counts.
        mix_weights: [22, 0.4, 0.94, 0.022, 1.7]
        batch_size: 128
        freeze_lm: False
        freeze_image_encoder: True
        optimizer: adam
        adam:
            learning_rate: 0.00002
            adam_b2: 0.95
            weight_decay: 0.0
        warmup_steps: 156
        lr_schedule: cos
        sample_per_step: 200
        online_eval_per_step: 750
        online_eval_tasks: [knn_partial, vqav2, mme, textvqa, pope, refcocog, pixelbench, gqa, vizwiz, scienceqa_img, seed_bench]
        final_eval_tasks: [knn_full, vqav2, mme, textvqa, pope, refcocog, pixelbench, mmbench, gqa, vizwiz, scienceqa_img, seed_bench]

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_recon_tokens: []
    device_batch_size: 32
    mmbench_max_new_tokens: 8

finetune: False
sharding: hsdp

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_entity: "sqa24-massachusetts-institute-of-technology"
    wandb_tags: ["llava1.5", "curriculum", "hsdp"]
    wandb_notes: "[init] LLaVA-1.5 two-stage curriculum using jit/HSDP. Stage-1 blip3o-short, stage-2 LLaVA-OV-1.5-Instruct plus VQAv2/GQA/TextCaps/Visual Genome QA."
