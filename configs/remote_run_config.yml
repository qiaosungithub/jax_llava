logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_entity: "sqa24-massachusetts-institute-of-technology"
    wandb_tags: ["llava1.5", "curriculum", "hsdp"]
    wandb_notes: "[prompt causal baseline] [laion-aes pretrain] LLaVA-1.5 reproduction two-stage curriculum using jit/HSDP. Stage-1 trains connector only; stage-2 trains connector + LM. Adam original LR: stage1 connector 1e-3, stage2 LM 2e-5, connector 5e-4. Stage-2 data: LLaVA-OV1.5-Instruct plus VQAv2/OKVQA/A-OKVQA/OCRVQA/GQA/TextCaps/Visual Genome QA, VG detection, and RefCOCO grounding."
