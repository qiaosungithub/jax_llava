model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    lm_checkpoint_variant: "it"

    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"

    projector_type: "mlp2x_gelu"
    projector_use_ln: False

    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    image_post_connector_scale: 1.0
    image_post_connector_transform: "fixed_scale"
    # image_post_connector_transform: "match_text_stats"
    image_text_stat_source: "prompt"
    image_text_stat_axes: "scalar"
    prompt_causal: True
    recon_loss_weight: 0.0
    vlm_loss_weight: 1.0
    text_only_loss_weight: 0.0
    cfg_loss_weight: 0.0
    alpha: 0.0

dataset:
    image_size: 336
    max_txt_len: 2048
    resize_mode: stretch
    # Default for stage1 (cc12m pretrain). stage2 (SFT with grouped OV1.5)
    # overrides num_workers to 8 in its dataset block (grouped OV1.5 fans out to
    # ~34 per-config sources; streams = sources x num_workers).
    num_workers: 16
    prefetch_factor: 4
    dataloader_timeout: 900
    stateful_dataloader: True
    stateful_dataloader_strict: True
    # The OV1.5 grouped/stationary-mixture knobs (llava_ov15_min_shards_standalone,
    # expand_conversations_at_fill, llava_ov15_weight_basis, weighted_item_shuffle_size)
    # live in stage2's dataset block so they only affect the SFT stage.
    item_shuffle_size:
        # llava_ov15 omitted: stage2 enables weighted_item_shuffle_size for it,
        # which overrides this per-type buffer.
        default: 2048
        vqav2: 2048
        okvqa: 2048
        aokvqa: 2048
        ocrvqa: 2048
        gqa: 2048
        textvqa: 2048
        genome: 2048
        genome_det: 2048
        refcoco: 2048
    # LLaVA-1.5 samples 10 Visual Genome region annotations per image.
    genome_det_regions_per_image: 10

training:
    curriculum: llava15_two_stage # train 2 stages together.

    # Global checkpoint stream in one workdir:
    # stage-1 [0, 2180), stage-2 [2180, 7375).
    stage1_steps: 2180
    # stage2_steps: 5195 # baseline
    # num_steps: 7375 # baseline
    stage2_steps: 50000
    num_steps: 52180

    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    optimizer: adam
    grad_clip_norm: 1.0
    log_per_step: 100
    checkpoint_per_step: 800
    log_vis_per_step: -1
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: []
    lr_schedule: cos
    seed: 42

    stage1:
        name: "stage1_projector_pretrain"
        model:
            # Keep projector pretraining as plain image-conditioned NTP.
            vlm_loss_weight: 1.0
            text_only_loss_weight: 0.0
            cfg_loss_weight: 0.0
            alpha: 0.0
        dataset:
            # max_txt_len: 64 # baseline
            max_txt_len: 160
        dataset_items:
            # - blip3o-short
            - cc12m
            # - laion-aes
        mix_weights: [1]
        batch_size: 256
        freeze_lm: True
        freeze_image_encoder: True
        optimizer: adam # TODO: ablate muon
        adam:
            learning_rate: 0.001
            adam_b2: 0.95
            weight_decay: 0.0
        vision_encoder_learning_rate: 0.00002
        connector_learning_rate: 0.001
        warmup_steps: 65
        lr_schedule: cos
        sample_per_step: -1
        # CLIP is frozen in stage 1, so ImageNet kNN cannot track training progress.
        online_eval_per_step: -1
        online_eval_tasks: []
        final_eval_tasks: []

    stage2:
        name: "stage2_visual_instruction_sft"
        model:
            # Enable CFG training only for SFT: VLM CE + text-only CE + CFG CE.
            vlm_loss_weight: 1.0
            text_only_loss_weight: 0.0
            cfg_loss_weight: 0.0
            alpha: 0.0
        dataset:
            max_txt_len: 512
            # grouped OV1.5 fans out to ~34 sources; fewer workers keeps streams sane.
            num_workers: 8
            # Grouped, stationary-mixture OV1.5 loader (removes valid-token drift):
            # per-config sources + expand-at-fill, weighted by QUESTION count
            # (OV1.5 grouped item weight 1.0 -> ~54 M QA), unit-consistent with the
            # M-of-QA weights of the other datasets.
            llava_ov15_min_shards_standalone: 64
            expand_conversations_at_fill: True
            llava_ov15_weight_basis: questions
            weighted_item_shuffle_size:
                enabled: True
                include_types: [llava_ov15]
                total: 131072
                min: 1024
                max: 262144
        dataset_items:
            - llava-ov-1.5-instruct-grouped
            - vqav2
            - okvqa-train
            - aokvqa-train
            - ocrvqa-train
            - tallyqa
            - gqa-train
            # - textcaps-train
            - visual-genome
            - visual-genome-det
            - refcoco-train
            - refcocog-train
        # Weights = MILLIONS OF QA EXAMPLES (true question/example counts). The
        # OV1.5 grouped item weight is an overall MULTIPLIER (1.0); weight_basis
        # =questions expands it to per-config sources summing to ~54 (M QA).
        # Order / counts (M): OV1.5(~54), vqav2 0.444, okvqa 0.009, aokvqa 0.068,
        # ocrvqa 0.802 (full train), gqa 0.943, textcaps 0.022, visual-genome 1.7,
        # vg-det 0.86 (10 regions/image), refcoco 0.042 (42404 refs).
        mix_weights: [1.0, 0.444, 0.009, 0.068, 0.802, 0.25, 0.943, 1.7, 0.86, 0.042, 0.042]
        # batch_size: 128 # baseline
        batch_size: 512
        freeze_lm: False
        freeze_lm_embed: False
        freeze_lm_late: False
        freeze_image_encoder: True
        optimizer: adam
        adam:
            # learning_rate: 0.00002 # baseline
            learning_rate: 0.00004
            adam_b2: 0.95
            weight_decay: 0.0
        # vision_encoder_learning_rate: 0.00002 # baseline
        # connector_learning_rate: 0.0005 # baseline
        vision_encoder_learning_rate: 0.00004
        connector_learning_rate: 0.001

        # warmup_steps: 156 # baseline
        warmup_steps: 1500
        lr_schedule: cos
        # sample_per_step: 200 # baseline
        # online_eval_per_step: 1200 # baseline
        sample_per_step: 2000
        online_eval_per_step: 5000
        online_eval_tasks: [vqav2, mme, textvqa, refcocog, pixelbench, gqa, vizwiz, scienceqa_img, seed_bench]
        final_eval_tasks: [vqav2, mme, textvqa, pope, refcocog, pixelbench, mmbench, gqa, vizwiz, scienceqa_img, seed_bench]

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_recon_tokens: []
    device_batch_size: 32
    eval_tokens_default: 64
    eval_tokens_shortqa: 8
    eval_tokens_mid: 16
    eval_tokens_ocr: 32
    eval_tokens_refcoco: 16
    eval_tokens_pixelbench: 32
    eval_tokens_mmbench: 8
    online_vqav2_sample_fraction: 0.1

finetune: False
sharding: hsdp_legacy_data

# Run this queue entry from scratch. Keep these empty so the run cannot restore
# an old checkpoint/dataloader state after monitor requeues it.
load_from: ''
wandb_resume_id: ''

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_entity: "sqa24-massachusetts-institute-of-technology"
    wandb_tags: ["llava1.5", "curriculum", "hsdp"]
    wandb_notes: "[new dataset + dataloader] [stage 2 4x batch size 50000 steps, llava-fusion] llava-1.5 reproduction. Stage-1 trains connector only with CFG disabled; stage-2 trains connector + LM with VLM/text-only/CFG losses 1:1:1 and alpha=1. Adam original LR: stage1 connector 1e-3, stage2 LM 4e-5, connector 1e-3. Stage-2 data: LLaVA-OV1.5-Instruct plus VQAv2/OKVQA/A-OKVQA/OCRVQA/GQA/TextCaps/Visual Genome QA, VG detection, and RefCOCO grounding."
