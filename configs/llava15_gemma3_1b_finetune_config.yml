model:
    arch: llava
    lm_backbone_str: "gemma3_1B"
    lm_checkpoint_variant: "it"

    vision_tower_str: "openai/clip-vit-large-patch14-336"
    vision_feature_layer: -2
    vision_select_feature: "patch"
    clip_input_format: "minus_one_to_one"

    projector_type: "mlp2x_gelu"
    projector_use_ln: False

    attn_logits_soft_cap: 0.0
    final_logit_softcap: 0.0
    txt_feature_layer: 0
    recon_loss_weight: 0.0

dataset:
    image_size: 336
    max_txt_length: 2048
    resize_mode: stretch

    # Uses the existing LLaVA-OneVision-1.5 formatting path in input_pipeline.
    # The step count below matches the LLaVA-1.5 SFT scale:
    # 5195 * 128 = 664960 samples.
    items:
        - llava-ov-1.5-instruct
        - vqav2
        - gqa-train
        - textcaps-train
        - visual-genome
    # Approximate current loader sample units in millions:
    # LLaVA-OV1.5 22M, VQAv2 ~0.4M QA, GQA train ~0.94M QA,
    # TextCaps ~0.022M captions, Visual Genome ~1.7M QA.
    mix_weights: [22, 0.4, 0.94, 0.022, 1.7]

    num_workers: 16
    prefetch_factor: 4

training:
    # LLaVA stage-2: frozen CLIP, train projector + LM.
    freeze_lm: False
    freeze_image_encoder: True
    vision_tower_from_scratch: False
    clip_from_pt: True
    hf_cache_dir: /dev/shm/huggingface

    optimizer: adam
    adam:
        learning_rate: 0.00002
        adam_b2: 0.95
        weight_decay: 0.0

    grad_clip_norm: 1.0
    log_per_step: 20
    checkpoint_per_step: 1000
    log_vis_per_step: -1
    sample_per_step: 200
    online_eval_per_step: -1
    online_eval_tasks: []
    final_eval_tasks: [gqa, vizwiz, scienceqa_img, seed_bench]

    num_steps: 5195
    warmup_steps: 156
    lr_schedule: cos
    batch_size: 128
    seed: 43

sampling:
    max_new_tokens: 64
    beam_size: 1

eval:
    eval_recon_tokens: []

finetune: True
load_from_pretrained: ""

logging:
    use_wandb: True
    wandb_project: "jax-llava"
    wandb_tags: ["llava15", "gemma3-1b", "stage2", "clip-l14-336"]
    wandb_notes: "LLaVA-style stage-2 using LLaVA-OV1.5 plus VQAv2/GQA/TextCaps. No ShareGPT text-only."
